<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow MD Bot - Premium WhatsApp Bot Connector</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
/* --------- Your existing CSS --------- */
* {margin:0; padding:0; box-sizing:border-box;}
body {font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); min-height:100vh; color:#fff; overflow-x:hidden;}
/* Include all other CSS from your previous code here */
/* ... existing CSS ... */
</style>
</head>
<body>

<ul class="bg-animation">
<li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li>
</ul>

<div class="container">
<div class="header">
<div class="logo-container">
<div class="logo"><i class="fas fa-user-secret"></i></div>
<div class="logo-ring"></div>
</div>
<div class="title">Shadow MD Bot</div>
<div class="subtitle">Premium WhatsApp Bot Connector</div>
</div>

<div class="input-group">
<label class="input-label">Phone Number</label>
<div class="input-wrapper">
<i class="fas fa-phone input-icon"></i>
<input type="text" class="phone-input" placeholder="Enter number">
</div>
</div>

<button class="generate-btn"><span class="btn-text">Generate Code</span><div class="spinner"></div></button>

<div class="result-box">
<div class="result-placeholder">Your code will appear here</div>
</div>

<div class="footer">
Made with ❤️ by <span class="footer-brand">Shadow</span>
</div>

<script>
const API_URL = "https://bot-baked-production.up.railway.app/generate"; // ✅ endpoint updated

const btn = document.querySelector(".generate-btn");
const input = document.querySelector(".phone-input");
const resultBox = document.querySelector(".result-box");

btn.addEventListener("click", async () => {
    const number = input.value.trim();
    if(!number){ showError("پہلے نمبر درج کریں"); return; }
    
    btn.classList.add("loading");
    resultBox.classList.remove("error", "has-result");
    resultBox.innerHTML = `<div class="result-placeholder">Generating code...</div>`;

    try{
        const response = await fetch(API_URL,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({number:number})
        });

        const data = await response.json();
        btn.classList.remove("loading");

        if(!response.ok){
            // Server returned an error status
            showError(`Server Error: ${response.status} ${response.statusText}`);
            console.error("Server Error Response:", data);
            return;
        }

        if(data.code){
            resultBox.classList.remove("error");
            resultBox.classList.add("has-result");
            resultBox.innerHTML = `
                <div class="pair-code">${data.code}</div>
                <div class="result-message">یہ کوڈ WhatsApp میں ڈالیں</div>
                <button class="copy-btn" onclick="copyCode('${data.code}')">
                <i class="fa fa-copy"></i> Copy Code
                </button>
            `;
        }else{
            showError("Code generate نہیں ہوا");
            console.log("API Response:", data);
        }

    }catch(err){
        btn.classList.remove("loading");
        showError("Network/Server Error");
        console.error("Fetch Error:", err);
    }
});

function copyCode(code){
    navigator.clipboard.writeText(code);
    showToast("Code Copy ہو گیا");
}

function showError(msg){
    resultBox.classList.add("error");
    resultBox.innerHTML = `<div class="result-message">${msg}</div>`;
}

function showToast(msg){
    const toast = document.createElement("div");
    toast.className = "toast show";
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(()=>{ toast.remove(); },3000);
}
</script>

</body>
</html>
