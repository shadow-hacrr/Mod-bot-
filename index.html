<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow MD Bot - Premium WhatsApp Bot Connector</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); min-height:100vh; color:#fff; overflow-x:hidden;}
.bg-animation{position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; overflow:hidden;}
.bg-animation li{position:absolute; display:block; list-style:none; width:20px; height:20px; background:rgba(255,255,255,0.1); animation:animate 25s linear infinite; bottom:-150px; border-radius:50%;}
.bg-animation li:nth-child(1){left:25%; width:80px; height:80px; animation-delay:0s; background:rgba(147,51,234,0.3);}
.bg-animation li:nth-child(2){left:10%; width:20px; height:20px; animation-delay:2s; animation-duration:12s; background:rgba(59,130,246,0.3);}
.bg-animation li:nth-child(3){left:70%; width:20px; height:20px; animation-delay:4s; background:rgba(236,72,153,0.3);}
.bg-animation li:nth-child(4){left:40%; width:60px; height:60px; animation-delay:0s; animation-duration:18s; background:rgba(16,185,129,0.3);}
.bg-animation li:nth-child(5){left:65%; width:20px; height:20px; animation-delay:0s; background:rgba(245,158,11,0.3);}
.bg-animation li:nth-child(6){left:75%; width:110px; height:110px; animation-delay:3s; background:rgba(239,68,68,0.3);}
.bg-animation li:nth-child(7){left:35%; width:150px; height:150px; animation-delay:7s; background:rgba(147,51,234,0.2);}
.bg-animation li:nth-child(8){left:50%; width:25px; height:25px; animation-delay:15s; animation-duration:45s; background:rgba(59,130,246,0.3);}
.bg-animation li:nth-child(9){left:20%; width:15px; height:15px; animation-delay:2s; animation-duration:35s; background:rgba(236,72,153,0.3);}
.bg-animation li:nth-child(10){left:85%; width:150px; height:150px; animation-delay:0s; animation-duration:11s; background:rgba(16,185,129,0.2);}
@keyframes animate {0%{transform:translateY(0) rotate(0deg); opacity:1; border-radius:0;} 100%{transform:translateY(-1000px) rotate(720deg); opacity:0; border-radius:50%;}}
.container{max-width:500px; margin:0 auto; padding:20px; position:relative; z-index:1;}
.header{text-align:center; padding:40px 20px; background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); border-radius:30px; border:1px solid rgba(255,255,255,0.1); margin-bottom:30px; box-shadow:0 8px 32px 0 rgba(31,38,135,0.37); position:relative; overflow:hidden;}
.header::before{content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent); transform:rotate(45deg); animation: shimmer 3s infinite;}
@keyframes shimmer {0% { transform:translateX(-100%) translateY(-100%) rotate(45deg);} 100% { transform:translateX(100%) translateY(100%) rotate(45deg); }}
.logo-container{position:relative; display:inline-block; margin-bottom:20px;}
.logo{width:100px; height:100px; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:50px; box-shadow:0 0 30px rgba(102,126,234,0.6); animation:pulse 2s infinite; position:relative; z-index:2;}
@keyframes pulse {0%,100%{transform:scale(1); box-shadow:0 0 30px rgba(102,126,234,0.6);} 50%{transform:scale(1.05); box-shadow:0 0 50px rgba(102,126,234,0.8);}}
.logo-ring{position:absolute; top:-10px; left:-10px; right:-10px; bottom:-10px; border:2px solid rgba(102,126,234,0.5); border-radius:50%; animation:rotate 10s linear infinite;}
@keyframes rotate{0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);}}
.title{font-size:2.5rem; font-weight:800; background:linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:10px; text-transform:uppercase; letter-spacing:2px;}
.subtitle{color:rgba(255,255,255,0.7); font-size:1rem; font-weight:300;}
.input-group{margin-bottom:25px;}
.input-label{display:block; margin-bottom:12px; font-size:1.1rem; font-weight:600; color:rgba(255,255,255,0.9);}
.input-wrapper{position:relative; display:flex; align-items:center;}
.input-icon{position:absolute; left:20px; color:#667eea; font-size:1.2rem;}
.phone-input{width:100%; padding:18px 20px 18px 55px; background:rgba(0,0,0,0.3); border:2px solid rgba(255,255,255,0.1); border-radius:15px; color:#fff; font-size:1.1rem; outline:none; transition:all 0.3s ease;}
.phone-input:focus{border-color:#667eea; box-shadow:0 0 20px rgba(102,126,234,0.3);}
.phone-input::placeholder{color:rgba(255,255,255,0.4);}
.generate-btn{width:100%; padding:20px; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); border:none; border-radius:15px; color:#fff; font-size:1.2rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:12px; transition:all 0.3s ease; box-shadow:0 10px 30px rgba(102,126,234,0.4); position:relative; overflow:hidden;}
.generate-btn::before{content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transition:left 0.5s;}
.generate-btn:hover::before{left:100%;}
.generate-btn:hover{transform:translateY(-3px); box-shadow:0 15px 40px rgba(102,126,234,0.6);}
.generate-btn:active{transform:translateY(-1px);}
.generate-btn:disabled{opacity:0.6; cursor:not-allowed; transform:none;}
.generate-btn.loading{pointer-events:none;}
.spinner{display:none; width:20px; height:20px; border:3px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite;}
.generate-btn.loading .spinner{display:block;}
.generate-btn.loading .btn-text{display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.result-box{margin-top:25px; padding:25px; background:rgba(0,0,0,0.4); border:2px dashed rgba(102,126,234,0.5); border-radius:15px; text-align:center; min-height:100px; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:all 0.3s ease;}
.result-box.has-result{background:rgba(16,185,129,0.1); border-color:#10b981; border-style:solid;}
.result-box.error{background:rgba(239,68,68,0.1); border-color:#ef4444;}
.result-placeholder{color:rgba(255,255,255,0.5); font-size:1rem;}
.pair-code{font-size:2rem; font-weight:800; letter-spacing:5px; color:#10b981; margin:10px 0; font-family:'Courier New', monospace; text-shadow:0 0 20px rgba(16,185,129,0.5); animation:fadeIn 0.5s ease;}
@keyframes fadeIn{from{opacity:0; transform:scale(0.8);} to{opacity:1; transform:scale(1);}}
.result-message{color:rgba(255,255,255,0.8); margin-top:10px; font-size:0.9rem;}
.copy-btn{margin-top:15px; padding:10px 25px; background:rgba(16,185,129,0.2); border:1px solid #10b981; color:#10b981; border-radius:8px; cursor:pointer; font-size:0.9rem; display:flex; align-items:center; gap:8px; transition:all 0.3s ease;}
.copy-btn:hover{background:#10b981; color:#fff;}
.footer{text-align:center; padding:30px 20px; color:rgba(255,255,255,0.5); font-size:0.9rem; border-top:1px solid rgba(255,255,255,0.1); margin-top:30px;}
.footer-brand{color:#667eea; font-weight:700;}
</style>
</head>
<body>

<ul class="bg-animation">
<li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li>
</ul>

<div class="container">
<div class="header">
<div class="logo-container">
<div class="logo"><i class="fas fa-user-secret"></i></div>
<div class="logo-ring"></div>
</div>
<div class="title">Shadow MD Bot</div>
<div class="subtitle">Premium WhatsApp Bot Connector</div>
</div>

<div class="input-group">
<label class="input-label">Phone Number</label>
<div class="input-wrapper">
<i class="fas fa-phone input-icon"></i>
<input type="text" class="phone-input" placeholder="Enter number">
</div>
</div>

<button class="generate-btn"><span class="btn-text">Generate Code</span><div class="spinner"></div></button>

<div class="result-box">
<div class="result-placeholder">Your code will appear here</div>
</div>

<div class="footer">
Made with ❤️ by <span class="footer-brand">Shadow</span>
</div>
</div>

<script>
const API_URL = "https://bot-baked-production.up.railway.app/"; // <-- یہاں اپنا Railway API URL لگانا ہے

const btn = document.querySelector(".generate-btn");
const input = document.querySelector(".phone-input");
const resultBox = document.querySelector(".result-box");

btn.addEventListener("click", async () => {
    const number = input.value.trim();
    if(!number){ showError("پہلے نمبر درج کریں"); return; }
    btn.classList.add("loading");
    try{
        const response = await fetch(API_URL,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({number:number})
        });
        const data = await response.json();
        btn.classList.remove("loading");
        if(data.code){
            resultBox.classList.remove("error");
            resultBox.classList.add("has-result");
            resultBox.innerHTML = `
                <div class="pair-code">${data.code}</div>
                <div class="result-message">یہ کوڈ WhatsApp میں ڈالیں</div>
                <button class="copy-btn" onclick="copyCode('${data.code}')">
                <i class="fa fa-copy"></i> Copy Code
                </button>
            `;
        }else{ showError("Code generate نہیں ہوا"); }
    }catch(err){
        btn.classList.remove("loading");
        showError("Server Error");
        console.log(err);
    }
});

function copyCode(code){
    navigator.clipboard.writeText(code);
    showToast("Code Copy ہو گیا");
}

function showError(msg){
    resultBox.classList.add("error");
    resultBox.innerHTML = `<div class="result-message">${msg}</div>`;
}

function showToast(msg){
    const toast = document.createElement("div");
    toast.className = "toast show";
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(()=>{ toast.remove(); },3000);
}
</script>

</body>
</html>
