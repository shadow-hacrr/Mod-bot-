<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow MD Bot - Premium WhatsApp Bot Connector</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); min-height:100vh; color:#fff; overflow-x:hidden;}

.bg-animation{position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; overflow:hidden;}
.bg-animation li{position:absolute; display:block; list-style:none; width:20px; height:20px; background:rgba(255,255,255,0.1); animation:animate 25s linear infinite; bottom:-150px; border-radius:50%;}
/* animation details skipped for brevity (use previous ones) */

.container{max-width:500px; margin:0 auto; padding:20px; position:relative; z-index:1;}
.header{text-align:center; padding:40px 20px; background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); border-radius:30px; border:1px solid rgba(255,255,255,0.1); margin-bottom:30px; box-shadow:0 8px 32px 0 rgba(31,38,135,0.37); position:relative; overflow:hidden;}
/* other CSS same as previous code */
.phone-input{width:100%; padding:18px 20px 18px 55px; background:rgba(0,0,0,0.3); border:2px solid rgba(255,255,255,0.1); border-radius:15px; color:#fff; font-size:1.1rem; outline:none; transition:all 0.3s ease;}
.generate-btn{width:100%; padding:20px; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); border:none; border-radius:15px; color:#fff; font-size:1.2rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:12px; transition:all 0.3s ease; box-shadow:0 10px 30px rgba(102,126,234,0.4); position:relative; overflow:hidden;}
.result-box{margin-top:25px; padding:25px; background:rgba(0,0,0,0.4); border:2px dashed rgba(102,126,234,0.5); border-radius:15px; text-align:center; min-height:100px; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:all 0.3s ease;}
.footer{text-align:center; padding:30px 20px; color:rgba(255,255,255,0.5); font-size:0.9rem; border-top:1px solid rgba(255,255,255,0.1); margin-top:30px;}
.footer-brand{color:#667eea; font-weight:700;}
</style>
</head>
<body>

<ul class="bg-animation">
<li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li>
</ul>

<div class="container">
<div class="header">
<div class="logo-container">
<div class="logo"><i class="fas fa-user-secret"></i></div>
<div class="logo-ring"></div>
</div>
<div class="title">Shadow MD Bot</div>
<div class="subtitle">Premium WhatsApp Bot Connector</div>
</div>

<div class="input-group">
<label class="input-label"><i class="fa fa-phone"></i> Phone Number</label>
<div class="input-wrapper">
<input type="text" class="phone-input" placeholder="923XXXXXXXXX">
</div>
</div>

<button class="generate-btn"><span class="btn-text">Generate Code</span><div class="spinner"></div></button>

<div class="result-box">
<div class="result-placeholder">Your pairing code will appear here</div>
</div>

<div class="footer">Made with ❤️ by <span class="footer-brand">Shadow</span></div>
</div>

<script>
const API_URL = "https://bot-baked-production.up.railway.app/pair";

const btn = document.querySelector(".generate-btn");
const input = document.querySelector(".phone-input");
const resultBox = document.querySelector(".result-box");

btn.addEventListener("click", async () => {
    const number = input.value.trim();
    if(!number){ showError("پہلے نمبر درج کریں"); return; }

    btn.classList.add("loading");
    resultBox.classList.remove("error", "has-result");
    resultBox.innerHTML = `<div class="result-placeholder">Generating code...</div>`;

    try{
        const response = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({number})
        });

        const text = await response.text(); // raw response
        let data = null;
        try { data = JSON.parse(text); } catch(e){}

        btn.classList.remove("loading");

        if(!response.ok){
            showError(`Server Error: ${response.status}`);
            console.log("Raw Response:", text);
            return;
        }

        if(data && data.pairingCode){
            resultBox.classList.remove("error");
            resultBox.classList.add("has-result");
            resultBox.innerHTML = `
                <div class="pair-code">${data.pairingCode}</div>
                <div class="result-message">یہ WhatsApp pairing code ہے</div>
                <button class="copy-btn" onclick="copyCode('${data.pairingCode}')"><i class="fa fa-copy"></i> Copy</button>
            `;
        }else{
            showError("کوڈ generate نہیں ہوا");
            console.log("Response Data:", data);
        }

    }catch(err){
        btn.classList.remove("loading");
        showError("Network/Server Error");
        console.error(err);
    }
});

function copyCode(code){
    navigator.clipboard.writeText(code);
    alert("Code copied to clipboard!");
}

function showError(msg){
    resultBox.classList.add("error");
    resultBox.innerHTML = `<div class="result-message">${msg}</div>`;
}
</script>

</body>
</html>
